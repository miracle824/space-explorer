<header>

    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="gallery.html">Gallery</a>

  </nav>

<section>

<form class="contact-form">

  <label for="name">Name:</label>
  <input type="text" id="name" required>

  <label>Gender:</label>
  <label><input type="radio" name="gender"> Male</label>
  <label><input type="radio" name="gender"> Female</label>

<label for="email">Email:</label>
<input type="email" id="email" required>

  <label>Preferences:</label>
  <label><input type="checkbox"> Watching</label>
  <label><input type="checkbox"> Exploring</label>

  <label>Satisfaction:</label>
  <label><input type="radio" name="satisfaction"> Low</label>
  <label><input type="radio" name="satisfaction"> Medium</label>
  <label><input type="radio" name="satisfaction"> High</label>

  <label for="message">Message:</label>
  <textarea id="message"></textarea>

  <button type="submit">Submit</button>

</form>

</section>
</body>
</html>
